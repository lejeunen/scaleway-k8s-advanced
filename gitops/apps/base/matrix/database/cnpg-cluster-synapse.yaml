apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: matrix-synapse
  namespace: matrix
spec:
  instances: 1

  bootstrap:
    initdb:
      database: synapse
      owner: app_admin
      encoding: UTF8
      localeCollate: C
      localeCType: C

  postgresql:
    parameters:
      shared_buffers: "64MB"
      effective_cache_size: "128MB"

  storage:
    size: 10Gi

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: matrix-backup-store

  resources:
    requests:
      memory: 256Mi
    limits:
      memory: 512Mi
