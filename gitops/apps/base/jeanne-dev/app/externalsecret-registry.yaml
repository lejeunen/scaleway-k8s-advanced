# Syncs the SHOWCASE's read-only pull credential from Scaleway Secret Manager into a
# dockerconfigjson Secret. Used BOTH as the Flux HelmRepository auth (to pull the OCI
# chart) and the pod imagePullSecret (to pull the image) - both from the jeanne-release
# CR project. Per-consumer (Charter S8): the IAM key behind it is jeanne-showcase-registry-pull
# (ContainerRegistryReadOnly, project-scoped to jeanne-release only, Charter Q4). Seed the
# value with scripts/push-secrets.sh.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jeanne-showcase-registry-pull
  namespace: jeanne-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-store
    kind: ClusterSecretStore
  target:
    name: jeanne-showcase-registry-pull
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{{ .credentials }}'
  data:
    - secretKey: credentials
      remoteRef:
        key: name:jeanne-showcase-registry-credentials
