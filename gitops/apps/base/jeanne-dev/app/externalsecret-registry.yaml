# Syncs the jeanne-release read-only pull credential from Scaleway Secret Manager into a
# dockerconfigjson Secret. Used BOTH as the Flux HelmRepository auth (to pull the OCI
# chart) and the pod imagePullSecret (to pull the image) - both from the jeanne-release
# CR project. The IAM key behind it is ContainerRegistryReadOnly, project-scoped to
# jeanne-release only (Charter Q4); seed the value with scripts/push-secrets.sh.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: jeanne-release-registry-pull
  namespace: jeanne-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-store
    kind: ClusterSecretStore
  target:
    name: jeanne-release-registry-pull
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{{ .credentials }}'
  data:
    - secretKey: credentials
      remoteRef:
        key: name:jeanne-release-registry-credentials
