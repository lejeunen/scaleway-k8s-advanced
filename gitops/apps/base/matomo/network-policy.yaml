apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: matomo
  namespace: matomo
spec:
  endpointSelector:
    matchLabels:
      app: matomo
  ingress:
    # Allow traffic from Envoy Gateway proxy
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: envoy
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # Allow tracking requests from wisdom app
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: sovereign-cloud-wisdom
            k8s:io.kubernetes.pod.namespace: wisdom
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
  egress:
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # MariaDB in same namespace
    - toEndpoints:
        - matchLabels:
            app: mariadb
      toPorts:
        - ports:
            - port: "3306"
              protocol: TCP
    # GeoIP database download (init container)
    - toFQDNs:
        - matchName: "download.db-ip.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: mariadb
  namespace: matomo
spec:
  endpointSelector:
    matchLabels:
      app: mariadb
  ingress:
    # Allow connections from Matomo only
    - fromEndpoints:
        - matchLabels:
            app: matomo
      toPorts:
        - ports:
            - port: "3306"
              protocol: TCP
  egress:
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
