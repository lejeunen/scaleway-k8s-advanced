# Routes analytics.scw.sovereigncloudwisdom.eu → Matomo via Envoy Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matomo
  namespace: matomo
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
  hostnames:
    - analytics.scw.sovereigncloudwisdom.eu
  rules:
    - backendRefs:
        - name: matomo
          port: 80
