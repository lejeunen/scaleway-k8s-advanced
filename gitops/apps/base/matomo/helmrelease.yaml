apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matomo
  namespace: matomo
spec:
  interval: 30m
  chart:
    spec:
      chart: matomo
      version: "11.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  values:
    # Matomo application settings
    matomoUsername: admin
    matomoEmail: admin@sovereigncloudwisdom.eu
    matomoWebsiteName: "Sovereign Cloud Wisdom"
    matomoWebsiteHost: "https://analytics.scw.sovereigncloudwisdom.eu"
    existingSecret: matomo-admin-credentials

    # Service: ClusterIP since Envoy Gateway handles external traffic
    service:
      type: ClusterIP

    # Disable ingress — using Gateway API HTTPRoute instead
    ingress:
      enabled: false

    # Persistence for Matomo data (plugins, config, GeoIP)
    persistence:
      enabled: true
      size: 5Gi

    resources:
      requests:
        memory: 256Mi
      limits:
        memory: 512Mi

    # GeoIP database — downloaded on each pod start by init container
    extraVolumes:
      - name: geoip
        emptyDir: {}
    initContainers:
      - name: geoip-download
        image: busybox:1.37
        command:
          - sh
          - -c
          - |
            wget -q -O /geoip/DBIP-City.mmdb.gz \
              "https://download.db-ip.com/free/dbip-city-lite-$(date +%Y-%m).mmdb.gz" && \
            gunzip -f /geoip/DBIP-City.mmdb.gz && \
            echo "GeoIP database downloaded successfully"
        volumeMounts:
          - name: geoip
            mountPath: /geoip
    extraVolumeMounts:
      - name: geoip
        mountPath: /opt/bitnami/matomo/misc/DBIP-City.mmdb
        subPath: DBIP-City.mmdb

    # MariaDB subchart (Matomo requires MySQL/MariaDB, CNPG not an option)
    mariadb:
      enabled: true
      architecture: standalone
      auth:
        database: matomo
        username: matomo
      primary:
        persistence:
          enabled: true
          size: 5Gi
        resources:
          requests:
            memory: 256Mi
          limits:
            memory: 512Mi
