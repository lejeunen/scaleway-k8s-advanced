apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: oidc-google
  namespace: dashy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: dashy
  oidc:
    provider:
      issuer: "https://accounts.google.com"
    clientID: "${GOOGLE_OIDC_CLIENT_ID}"
    clientSecret:
      name: "google-oidc-client-secret"
    redirectURL: "https://dev.scw.sovereigncloudwisdom.eu/oauth2/callback"
    scopes:
      - openid
      - email
    cookieNames:
      idToken: "dashy-id-token"
      accessToken: "dashy-access-token"
  jwt:
    providers:
      - name: google
        issuer: "https://accounts.google.com"
        audiences:
          - "${GOOGLE_OIDC_CLIENT_ID}"
        remoteJWKS:
          uri: "https://www.googleapis.com/oauth2/v3/certs"
        extractFrom:
          cookies:
            - "dashy-id-token"
  authorization:
    defaultAction: Deny
    rules:
      - name: allow-nicolas
        action: Allow
        principal:
          jwt:
            provider: google
            claims:
              - name: email
                values:
                  - "lejeune.n@gmail.com"
