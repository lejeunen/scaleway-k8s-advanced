apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashy
  namespace: dashy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashy
  template:
    metadata:
      labels:
        app: dashy
    spec:
      initContainers:
        - name: copy-config
          image: busybox:1.37
          command: ["cp", "/config/conf.yml", "/user-data/conf.yml"]
          volumeMounts:
            - name: config
              mountPath: /config
            - name: user-data
              mountPath: /user-data
      containers:
        - name: dashy
          image: lissy93/dashy:3.1.12
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: user-data
              mountPath: /app/user-data
      volumes:
        - name: config
          configMap:
            name: dashy-config
        - name: user-data
          emptyDir: {}
