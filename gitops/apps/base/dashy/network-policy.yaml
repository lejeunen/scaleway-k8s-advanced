apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: dashy
  namespace: dashy
spec:
  endpointSelector:
    matchLabels:
      app: dashy
  ingress:
    # Allow traffic from Envoy Gateway proxy
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: envoy
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Status checks - Grafana
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: grafana
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # Status checks - Flux Web UI
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: flux-operator
            k8s:io.kubernetes.pod.namespace: flux-system
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Status checks - Matomo
    - toEndpoints:
        - matchLabels:
            app: matomo
            k8s:io.kubernetes.pod.namespace: matomo
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # Status checks - Element Web
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: element-web
            k8s:io.kubernetes.pod.namespace: matrix
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # Status checks - Sovereign Cloud Wisdom
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: sovereign-cloud-wisdom
            k8s:io.kubernetes.pod.namespace: wisdom
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
