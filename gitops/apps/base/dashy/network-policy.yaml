apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: dashy
  namespace: dashy
spec:
  endpointSelector:
    matchLabels:
      app: dashy
  ingress:
    # Allow traffic from Envoy Gateway proxy
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: envoy
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Status checks - in-cluster services
    - toEntities:
        - cluster
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "8080"
              protocol: TCP
            - port: "9080"
              protocol: TCP
    # Status checks - external services (GitHub, Scaleway Console)
    - toCIDRSet:
        - cidr: "0.0.0.0/0"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
