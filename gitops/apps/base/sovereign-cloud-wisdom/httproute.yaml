# Routes wisdom.scw.sovereigncloudwisdom.eu → app Service via Envoy Gateway
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sovereign-cloud-wisdom
  namespace: wisdom
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
  hostnames:
    - wisdom.scw.sovereigncloudwisdom.eu
  rules:
    - backendRefs:
        - name: sovereign-cloud-wisdom
          port: 80
