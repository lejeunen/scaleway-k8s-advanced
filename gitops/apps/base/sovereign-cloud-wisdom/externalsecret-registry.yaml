# Syncs registry pull credentials from Scaleway Secret Manager → dockerconfigjson
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sovereign-cloud-wisdom-registry
  namespace: wisdom
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-store
    kind: ClusterSecretStore
  target:
    name: sovereign-cloud-wisdom-registry
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{{ .credentials }}'
  data:
    - secretKey: credentials
      remoteRef:
        key: name:wisdom-registry-credentials
