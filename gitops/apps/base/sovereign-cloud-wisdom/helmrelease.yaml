# Deploys the app chart and overrides platform-specific values
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sovereign-cloud-wisdom
  namespace: wisdom
spec:
  interval: 30m
  chart:
    spec:
      chart: chart
      sourceRef:
        kind: GitRepository
        name: sovereign-cloud-wisdom
        namespace: flux-system
      interval: 5m
  values:
    image:
      repository: rg.fr-par.scw.cloud/sovereign-cloud-wisdom/sovereign-cloud-wisdom
      pullSecret: sovereign-cloud-wisdom-registry
    database:
      secret: wisdom-db-app
    cloudProvider: scaleway
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
