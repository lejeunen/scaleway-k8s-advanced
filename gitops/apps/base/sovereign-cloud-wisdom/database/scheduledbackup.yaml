apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: wisdom-db-daily
  namespace: wisdom
spec:
  schedule: "0 0 0 * * *"
  backupOwnerReference: self
  cluster:
    name: wisdom-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  immediate: true
