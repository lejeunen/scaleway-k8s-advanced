apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: jeanne
  namespace: jeanne
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: jeanne
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # K8s API server
    - toEntities:
        - kube-apiserver
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    # HTTPS egress (Mistral API)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Matrix homeserver (Synapse in-cluster)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: matrix
      toPorts:
        - ports:
            - port: "8008"
              protocol: TCP
  ingress:
    # Kubelet health probes
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "18790"
              protocol: TCP
