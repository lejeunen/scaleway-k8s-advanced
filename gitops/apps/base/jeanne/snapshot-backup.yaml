---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jeanne-snapshot-backup
  namespace: jeanne
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jeanne-snapshot-backup
  namespace: jeanne
rules:
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jeanne-snapshot-backup
  namespace: jeanne
subjects:
  - kind: ServiceAccount
    name: jeanne-snapshot-backup
    namespace: jeanne
roleRef:
  kind: Role
  name: jeanne-snapshot-backup
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: jeanne-snapshot-backup
  namespace: jeanne
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: jeanne-snapshot-backup
        spec:
          serviceAccountName: jeanne-snapshot-backup
          restartPolicy: OnFailure
          containers:
            - name: snapshot
              image: docker.io/alpine/k8s:1.32.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  SNAP_NAME="jeanne-data-$$(date +%Y%m%d-%H%M%S)"
                  echo "Creating snapshot $${SNAP_NAME}..."
                  cat <<EOF | kubectl create -f -
                  apiVersion: snapshot.storage.k8s.io/v1
                  kind: VolumeSnapshot
                  metadata:
                    name: $${SNAP_NAME}
                    namespace: jeanne
                    labels:
                      app.kubernetes.io/name: jeanne-snapshot-backup
                  spec:
                    volumeSnapshotClassName: scw-snapshot
                    source:
                      persistentVolumeClaimName: jeanne-data
                  EOF
                  echo "Cleaning up old snapshots (keeping 3)..."
                  kubectl get volumesnapshot -n jeanne \
                    -l app.kubernetes.io/name=jeanne-snapshot-backup \
                    --sort-by=.metadata.creationTimestamp \
                    -o jsonpath='{.items[*].metadata.name}' | \
                    tr ' ' '\n' | head -n -3 | \
                    xargs -r kubectl delete volumesnapshot -n jeanne
                  echo "Done."
