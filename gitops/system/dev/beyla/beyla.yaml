apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: beyla
  namespace: flux-system
spec:
  dependsOn:
    - name: loki
    - name: alloy
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/system/base/beyla
  prune: true
  wait: true
  postBuild:
    substitute:
      CLUSTER_NAME: ${CLUSTER_NAME}
