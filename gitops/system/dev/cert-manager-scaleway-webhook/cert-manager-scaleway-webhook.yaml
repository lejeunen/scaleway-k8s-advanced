apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-scaleway-webhook
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/system/base/cert-manager-scaleway-webhook
  prune: true
  wait: true
