apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-web-ui
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-store
    - name: envoy-gateway
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/system/base/flux-web-ui
  prune: true
