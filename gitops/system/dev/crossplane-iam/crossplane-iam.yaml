apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-iam
  namespace: flux-system
spec:
  dependsOn:
    - name: crossplane-config
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/system/base/crossplane-iam
  prune: true
  wait: true
  postBuild:
    substitute:
      SCW_PROJECT_ID: ${SCW_PROJECT_ID}
