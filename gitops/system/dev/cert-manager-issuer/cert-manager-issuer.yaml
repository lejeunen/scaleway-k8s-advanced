apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-issuer
  namespace: flux-system
spec:
  dependsOn:
    - name: cert-manager
    - name: external-secrets-store
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/system/base/cert-manager-issuer
  prune: true
  wait: true
  postBuild:
    substitute:
      ACME_EMAIL: ${ACME_EMAIL}
