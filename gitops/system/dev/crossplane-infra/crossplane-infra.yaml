apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-infra
  namespace: flux-system
spec:
  dependsOn:
    - name: crossplane-config
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/system/base/crossplane-infra
  prune: true
  wait: true
