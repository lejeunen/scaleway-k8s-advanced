apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-store
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/system/base/external-secrets-store
  prune: true
  wait: true
  postBuild:
    substitute:
      SCW_REGION: ${SCW_REGION}
      SCW_PROJECT_ID: ${SCW_PROJECT_ID}
