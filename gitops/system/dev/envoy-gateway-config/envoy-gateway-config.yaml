apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway-config
  namespace: flux-system
spec:
  dependsOn:
    - name: envoy-gateway
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/system/dev/envoy-gateway-config/envoy-gateway-config
  prune: true
  wait: true
