# Registry credentials in flux-system namespace for ImageRepository scanning
# (mirrors the ExternalSecret in wisdom namespace, same Secret Manager entry)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sovereign-cloud-wisdom-registry
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: scaleway-secret-store
    kind: ClusterSecretStore
  target:
    name: sovereign-cloud-wisdom-registry
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{{ .credentials }}'
  data:
    - secretKey: credentials
      remoteRef:
        key: name:wisdom-registry-credentials
