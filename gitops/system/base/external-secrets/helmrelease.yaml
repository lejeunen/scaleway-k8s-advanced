apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  maxHistory: 2
  interval: 30m
  chart:
    spec:
      chart: external-secrets
      version: "2.0.x"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
      interval: 1h
  install:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
  upgrade:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
