apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system
spec:
  maxHistory: 2
  interval: 30m
  chart:
    spec:
      chart: gateway-helm
      version: "1.7.x"
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 1
      strategy: rollback
