apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw-operator
  namespace: openclaw
spec:
  interval: 30m
  chart:
    spec:
      chart: openclaw-operator
      version: "0.10.25"
      sourceRef:
        kind: HelmRepository
        name: openclaw-operator
      interval: 24h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      strategy: rollback
  values:
    webhook:
      enabled: true
      certManager:
        enabled: true
    crds:
      install: true
      keep: true
