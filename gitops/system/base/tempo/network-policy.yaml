apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tempo
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: tempo
  ingress:
    # Alloy forwards traces
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: alloy
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
    # Grafana queries traces
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: grafana
      toPorts:
        - ports:
            - port: "3200"
              protocol: TCP
    # Jeanne queries traces (Phase 10 query-tempo skill) - the "customer admits Jeanne"
    # pattern. Scoped to the jeanne-dev product namespace. Query API is 3200 (her own
    # audit also lands here via service.name "jeanne", pushed through Alloy).
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: jeanne
            k8s:io.kubernetes.pod.namespace: jeanne-dev
      toPorts:
        - ports:
            - port: "3200"
              protocol: TCP
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
