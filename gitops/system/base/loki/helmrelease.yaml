apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: loki
      version: "6.x"
      sourceRef:
        kind: HelmRepository
        name: grafana
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      strategy: rollback
  values:
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      limits_config:
        retention_period: 7d
      commonConfig:
        replication_factor: 1
      compactor:
        retention_enabled: true
        delete_request_store: filesystem
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: loki_index_
              period: 24h

    singleBinary:
      replicas: 1
      persistence:
        size: 10Gi
      resources:
        requests:
          memory: 256Mi

    # Disable components not needed in SingleBinary mode
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    # Disable gateway, canary, test, minio, caches — not needed in SingleBinary mode
    gateway:
      enabled: false
    lokiCanary:
      enabled: false
    test:
      enabled: false
    minio:
      enabled: false
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
