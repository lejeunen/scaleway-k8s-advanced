apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  maxHistory: 2
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: "1.20.2"
      sourceRef:
        kind: HelmRepository
        name: jetstack
      interval: 1h
  install:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
  upgrade:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
  values:
    crds:
      enabled: true
      keep: true
    config:
      enableGatewayAPI: true
