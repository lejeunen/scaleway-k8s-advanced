apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scaleway-certmanager-webhook
  namespace: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: scaleway-certmanager-webhook
      version: "0.4.x"
      sourceRef:
        kind: HelmRepository
        name: scaleway
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      strategy: rollback
  values:
    secret:
      externalSecretName: scaleway-dns-credentials
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
