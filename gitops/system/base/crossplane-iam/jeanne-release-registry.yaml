# Read-only pull identity for the showcase to consume the RELEASED Jeanne artifacts
# (image + OCI chart) from the dedicated jeanne-release CR project (Phase 12/13).
#
# IAM is per-PROJECT (Charter Q4), so this is scoped to jeanne-release ONLY - it cannot
# reach the dev project's jeanne-dev / wisdom registry namespaces. That project isolation
# is the whole reason jeanne-release exists. The credential is materialized as the
# docker-registry Secret jeanne-registry-pull in the jeanne-dev namespace (ESO; see the
# app's externalsecret-registry.yaml) and used BOTH as the Flux HelmRepository auth (to
# pull the chart) and as the pod imagePullSecret (to pull the image).
#
# No push identity here: the release is pushed from the laptop with the nicolas-account
# profile; the showcase, like any customer, only pulls.
apiVersion: iam.scaleway.upbound.io/v1alpha1
kind: Application
metadata:
  name: jeanne-release-registry-pull
spec:
  deletionPolicy: Orphan
  forProvider:
    name: jeanne-release-registry-pull
    description: "Read-only credentials for the showcase to pull released Jeanne artifacts from the jeanne-release CR project"
    organizationId: "${SCW_ORGANIZATION_ID}"
    tags:
      - env=dev
      - managed-by=crossplane
  providerConfigRef:
    name: default
---
apiVersion: iam.scaleway.upbound.io/v1alpha1
kind: Policy
metadata:
  name: jeanne-release-registry-pull
spec:
  deletionPolicy: Orphan
  forProvider:
    name: jeanne-release-registry-pull
    description: "Container Registry read-only access to the jeanne-release project (released chart + image)"
    organizationId: "${SCW_ORGANIZATION_ID}"
    applicationIdRef:
      name: jeanne-release-registry-pull
    rule:
      - permissionSetNames:
          - ContainerRegistryReadOnly
        projectIds:
          # jeanne-release (NOT ${SCW_PROJECT_ID} - IAM is per-project, Charter Q4)
          - "e019b6fb-0a41-4818-af40-0444c1db8156"
    tags:
      - env=dev
      - managed-by=crossplane
  providerConfigRef:
    name: default
