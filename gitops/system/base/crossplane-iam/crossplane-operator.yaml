apiVersion: iam.scaleway.upbound.io/v1alpha1
kind: Application
metadata:
  name: crossplane-operator
spec:
  forProvider:
    name: crossplane-operator
    description: "Scoped credentials for Crossplane Scaleway provider"
    organizationId: "${SCW_ORGANIZATION_ID}"
    tags:
      - env=dev
      - managed-by=crossplane
  providerConfigRef:
    name: default
---
apiVersion: iam.scaleway.upbound.io/v1alpha1
kind: Policy
metadata:
  name: crossplane-operator
spec:
  forProvider:
    name: crossplane-operator
    description: "Object Storage, Container Registry, and DNS access for Crossplane"
    organizationId: "${SCW_ORGANIZATION_ID}"
    applicationIdRef:
      name: crossplane-operator
    rule:
      - permissionSetNames:
          - ObjectStorageFullAccess
          - ContainerRegistryFullAccess
          - DomainsDNSFullAccess
        projectIds:
          - "${SCW_PROJECT_ID}"
    tags:
      - env=dev
      - managed-by=crossplane
  providerConfigRef:
    name: default
