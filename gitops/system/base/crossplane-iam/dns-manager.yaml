apiVersion: iam.scaleway.upbound.io/v1alpha1
kind: Application
metadata:
  name: dns-manager
spec:
  deletionPolicy: Orphan
  forProvider:
    name: dns-manager
    description: "Scoped credentials for external-dns and cert-manager DNS-01 solver"
    organizationId: "${SCW_ORGANIZATION_ID}"
    tags:
      - env=dev
      - managed-by=crossplane
  providerConfigRef:
    name: default
---
apiVersion: iam.scaleway.upbound.io/v1alpha1
kind: Policy
metadata:
  name: dns-manager
spec:
  deletionPolicy: Orphan
  forProvider:
    name: dns-manager
    description: "DNS-only access for external-dns and cert-manager"
    organizationId: "${SCW_ORGANIZATION_ID}"
    applicationIdRef:
      name: dns-manager
    rule:
      - permissionSetNames:
          - DomainsDNSFullAccess
        organizationId: "${SCW_ORGANIZATION_ID}"
    tags:
      - env=dev
      - managed-by=crossplane
  providerConfigRef:
    name: default
