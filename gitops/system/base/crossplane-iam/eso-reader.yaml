apiVersion: iam.scaleway.upbound.io/v1alpha1
kind: Application
metadata:
  name: eso-reader
spec:
  deletionPolicy: Orphan
  forProvider:
    name: eso-reader
    description: "Scoped credentials for External Secrets Operator (Secret Manager read-only)"
    organizationId: "${SCW_ORGANIZATION_ID}"
    tags:
      - env=dev
      - managed-by=crossplane
  providerConfigRef:
    name: default
---
apiVersion: iam.scaleway.upbound.io/v1alpha1
kind: Policy
metadata:
  name: eso-reader
spec:
  deletionPolicy: Orphan
  forProvider:
    name: eso-reader
    description: "Secret Manager read-only access for ESO ClusterSecretStore"
    organizationId: "${SCW_ORGANIZATION_ID}"
    applicationIdRef:
      name: eso-reader
    rule:
      - permissionSetNames:
          - SecretManagerReadOnly
        projectIds:
          - "${SCW_PROJECT_ID}"
    tags:
      - env=dev
      - managed-by=crossplane
  providerConfigRef:
    name: default
