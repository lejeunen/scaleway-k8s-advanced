apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy-operator
  namespace: trivy-system
spec:
  interval: 30m
  chart:
    spec:
      chart: trivy-operator
      version: "0.32.x"
      sourceRef:
        kind: HelmRepository
        name: aqua
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      strategy: rollback
  values:
    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      privileged: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
    trivyOperator:
      scanJobPodTemplatePodSecurityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      scanJobPodTemplateContainerSecurityContext:
        allowPrivilegeEscalation: false
        privileged: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
    operator:
      scanJobsConcurrentLimit: 1
      infraAssessmentScannerEnabled: false
      clusterComplianceEnabled: false
    excludeNamespaces: "kube-system,kube-node-lease,kube-public"
    trivy:
      ignoreUnfixed: true
      severity: HIGH,CRITICAL
      configFile:
        cache:
          backend: memory
      resources:
        limits:
          cpu: 500m
          memory: 1G
        requests:
          cpu: 100m
          memory: 100M
    serviceMonitor:
      enabled: true
