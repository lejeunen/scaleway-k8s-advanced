apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: oidc-google
  namespace: flux-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: flux-web-ui
  oidc:
    provider:
      issuer: "https://accounts.google.com"
    clientID: "${GOOGLE_OIDC_CLIENT_ID}"
    clientSecret:
      name: "google-oidc-client-secret"
    redirectURL: "https://flux.scw.sovereigncloudwisdom.eu/oauth2/callback"
    scopes:
      - openid
      - email
    cookieDomain: "scw.sovereigncloudwisdom.eu"
  authorization:
    defaultAction: Deny
    rules:
      - name: allow-nicolas
        action: Allow
        principal:
          jwt:
            provider: oidc-google
            claims:
              - name: email
                values:
                  - "lejeune.n@gmail.com"
