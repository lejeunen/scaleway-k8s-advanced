apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: image-automation
  namespace: flux-system
spec:
  dependsOn:
    - name: platform-config
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/clusters/dev/image-automation
  prune: true
