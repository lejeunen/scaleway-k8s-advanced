# Separated from platform because Kustomize dry-run rejects CRD instances
# (ClusterIssuer, ClusterSecretStore) when their CRDs don't exist yet.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-config
  namespace: flux-system
spec:
  dependsOn:
    - name: platform
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/platform-config/dev
  prune: true
  wait: true
  postBuild:
    substitute:
      SCW_PROJECT_ID: "25485e2e-7a3a-40ae-8d0c-1496ef7c5e0f"
      SCW_REGION: "fr-par"
      CLUSTER_NAME: "dev"
      ACME_EMAIL: "lejeune.n@gmail.com"
