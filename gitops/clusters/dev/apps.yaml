apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: crossplane
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/apps/dev
  prune: true
  postBuild:
    substitute:
      SCW_REGION: "fr-par"
      CLUSTER_NAME: "dev"
